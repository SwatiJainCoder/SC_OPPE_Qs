<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Color List</title>
</head>
<body>

<pre class="language-javascript">
<code class="javascript">
<span class="color-name">"aliceblue"</span>: <span class="color-code">"#f0f8ff"</span>,
<span class="color-name">"antiquewhite"</span>: <span class="color-code">"#faebd7"</span>,
<span class="color-name">"aqua"</span>: <span class="color-code">"#00ffff"</span>,
<span class="color-name">"aquamarine"</span>: <span class="color-code">"#7fffd4"</span>,
<span class="color-name">"azure"</span>: <span class="color-code">"#f0ffff"</span>,

<!-- Multiple entries in one line -->
<span class="color-name">"beige"</span>: <span class="color-code">"#f5f5dc"</span>, <span class="color-name">"bisque"</span>: <span class="color-code">"#ffe4c4"</span>,

<!-- Edge cases -->
<span class="color-name">"black"</span>: <span class="color-code">"#000000"</span>,
<span class="color-name">"blue"</span>: <span class="color-code">"#0000ff"</span>,
<span class="color-name">"blueviolet"</span>: <span class="color-code">"#8a2be2"</span>,

<!-- Invalid / noisy lines -->
<span class="color-name">"invalid"</span>: <span class="color-code">"not-a-color"</span>,
random text that should be ignored

</code>
</pre>

</body>
</html>
